services:
  # ─────────────────────────────────────────
  #  MySQL Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hoidanit_mysql
    restart: unless-stopped
    command: --innodb_use_native_aio=0 --innodb_flush_method=fsync
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-hoidanit_ecommerce}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hoidanit_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -u root -p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ─────────────────────────────────────────
  #  Backend – NestJS
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend-nest-hoidanit
      dockerfile: Dockerfile
      target: production
    container_name: hoidanit_backend
    restart: unless-stopped
    env_file:
      - ./backend-nest-hoidanit/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_SYNCHRONIZE: "true"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend-nest-hoidanit/uploads:/app/uploads
    networks:
      - hoidanit_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  #  Seeder – chạy seed data sau khi DB sẵn
  # ─────────────────────────────────────────
  seeder:
    build:
      context: ./backend-nest-hoidanit
      dockerfile: Dockerfile
      target: seeder
    container_name: hoidanit_seeder
    env_file:
      - ./backend-nest-hoidanit/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_SYNCHRONIZE: "true"
    command: ["node", "dist/database/seed.js", "all"]
    networks:
      - hoidanit_network
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────
  #  Frontend – React (Vite)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-react-hoidanit
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: hoidanit_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - hoidanit_network
    depends_on:
      - backend

# ─────────────────────────────────────────
#  Volumes & Networks
# ─────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

networks:
  hoidanit_network:
    driver: bridge
